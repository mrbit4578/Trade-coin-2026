# Deploy static live dashboard to GitHub Pages
# Enable: Settings → Pages → Source = GitHub Actions
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "data/public/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r web/* _site/
          mkdir -p _site/data/public
          cp -r data/public/* _site/data/public/
          # Helpful marker
          date -u +"%Y-%m-%dT%H:%M:%SZ" > _site/deployed_at.txt
          ls -la _site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
