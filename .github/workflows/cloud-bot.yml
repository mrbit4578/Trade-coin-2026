# Scheduled lightweight paper scan → update data/public/latest.json
# Powers the "Bot cloud" panel on GitHub Pages without your PC.
name: Cloud paper bot

on:
  schedule:
    # every 30 minutes (UTC)
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps (light)
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run cloud scan
        env:
          MODE: paper
          LIVE_CONFIRM: "false"
          TRADE_VENUE: paper
          MC_SIMULATIONS: "1500"
          MIROFISH_AGENTS: "40"
          AUTO_START_BOT: "false"
        run: python scripts/cloud_scan.py

      - name: Commit latest.json
        run: |
          git config user.name "trade-coin-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/public/latest.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore(data): cloud paper scan $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
